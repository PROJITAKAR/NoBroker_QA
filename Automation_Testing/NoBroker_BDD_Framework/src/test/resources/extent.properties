#Spark Report
extent.reporter.spark.start=true
extent.reporter.spark.out=target/ExtentReports/Spark.html
extent.reporter.spark.config=src/test/resources/extent-config.xml

#PDF Report (OPTIONAL - keep false to avoid conflicts)
extent.reporter.pdf.start=false
extent.reporter.pdf.out=target/ExtentReports/ExtentPDF.pdf

#Screenshot
screenshot.dir=target/screenshots/
screenshot.rel.path=../screenshots/

#HTML Report (NOT needed if using spark, keep false)
extent.reporter.html.start=false
extent.reporter.html.out=target/ExtentReports/ExtentHtml.html

#Base Folder Name
basefolder.name=target/ExtentReports/SparkReports_
basefolder.datetimepattern=d-MMM-YY HH-mm-ss

#Report View Order
extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log

#Adds base64 screenshots to report
extent.reporter.spark.base64imagesrc=false

extent.gherkinDialect=en